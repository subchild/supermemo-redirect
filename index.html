<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Supermemo Is Now Supersolo</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-N1GG5TVGWR"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-N1GG5TVGWR");
    </script>
    <meta name="theme-color" content="#000000" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Space Grotesk", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        color: #ffffff;
        background: #000000;
      }

      .page {
        position: relative;
        min-height: 100dvh;
        height: 100dvh;
        display: grid;
        place-items: center;
        padding: 24px;
        overflow: hidden;
      }

      .bg-warm,
      .bg-cool,
      .bg-overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .bg-warm {
        background: #000000;
      }

      .bg-warm::before {
        content: "";
        position: absolute;
        left: -45vw;
        top: -45vh;
        width: 190vw;
        height: 190vh;
        background-image: url("https://supersolo.co/landing/frontsite-bg.jpeg");
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        transform: rotate(300deg);
        transform-origin: center;
        opacity: 0.25;
        filter: saturate(0.85) contrast(1.05);
      }

      .bg-overlay {
        background: linear-gradient(
          180deg,
          rgba(0, 0, 0, 0.2) 0%,
          rgba(0, 0, 0, 0.5) 40%,
          rgba(0, 0, 0, 0.74) 100%
        );
      }

      .bg-cool {
        top: 33%;
        right: 0;
        width: 66%;
        height: 50%;
        opacity: 0.25;
        filter: blur(80px);
        background: #445f74;
      }

      .card {
        position: relative;
        z-index: 1;
        width: min(760px, 100%);
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.15);
        border-radius: 16px;
        padding: 50px 60px;
        backdrop-filter: blur(2px);
        text-align: center;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(1.8rem, 5vw, 2.5rem);
        line-height: 1.05;
        font-weight: 200;
        letter-spacing: -0.015em;
      }

      .brand-lockup {
        white-space: nowrap;
      }

      .h1-logo {
        height: 0.9em;
        width: auto;
        vertical-align: middle;
        margin-left: 0.18em;
        filter: brightness(0) invert(1);
      }

      p {
        margin: 0 0 50px;
        color: rgba(255, 255, 255, 0.9);
        font-size: clamp(1rem, 2.5vw, 1.2rem);
        line-height: 1.4;
        font-weight: 200;
      }

      .meta {
        margin-top: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        flex-wrap: wrap;
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.85);
      }

      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 10px 16px;
        text-decoration: none;
        color: #111723;
        background: #ffffff;
        font-weight: 400;
      }

      @media (max-width: 640px) {
        .page {
          padding: 20px;
        }

        .card {
          width: min(100%, 420px);
          padding: 40px 28px;
        }

        h1 {
          font-size: clamp(1.55rem, 6.4vw, 1.9rem);
          margin-bottom: 10px;
          line-height: 1.1;
        }

        .h1-logo {
          height: 1em;
        }

        p {
          margin-bottom: 40px;
        }

        .meta {
          font-size: 0.95rem;
          gap: 10px;
        }

        .brand-period {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="bg-warm" aria-hidden="true"></div>
      <div class="bg-overlay" aria-hidden="true"></div>
      <div class="bg-cool" aria-hidden="true"></div>

      <section class="card" role="status" aria-live="polite">
        <h1>
          supermemo is now
          <span class="brand-lockup"
            ><img class="h1-logo" src="https://supersolo.co/supersolo-horiz.svg" alt="Supersolo" /><span class="brand-period"
              >.</span
            ></span
          >
        </h1>
        <p>
          All your notes, context, and tasks in one place — powered by AI.
        </p>
        <div class="meta">
          <span>Redirecting in <strong id="countdown">20</strong> seconds...</span>
          <a class="button" href="https://supersolo.co">Go to Supersolo now</a>
        </div>
      </section>
    </main>
    <script>
      (function () {
        var seconds = 20;
        var target = "https://supersolo.co";
        var countdown = document.getElementById("countdown");
        var timer = window.setInterval(function () {
          seconds -= 1;
          if (countdown) countdown.textContent = String(seconds);
          if (seconds <= 0) {
            window.clearInterval(timer);
            window.location.replace(target);
          }
        }, 1000);
      })();
    </script>
  </body>
</html>
